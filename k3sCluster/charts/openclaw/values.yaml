replicaCount: 1

image:
  repository: ghcr.io/openclaw/openclaw
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 18789
  targetPort: 18789

extraPorts:
  canvas:
    enabled: false
    port: 18793
    targetPort: 18793

nodeSelector: {}

resources: {}

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kang-stay-gmk
                - kang-rpi4

env:
  HOME: /home/node
  NODE_ENV: production
  TERM: xterm-256color
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  OPENCLAW_GATEWAY_PORT: "18789"
  OPENCLAW_GATEWAY_BIND: "lan"
  XDG_CONFIG_HOME: /home/node/.openclaw

secrets:
  env: {}
  # OPENCLAW_GATEWAY_TOKEN: change-me

gatewayConfig:
  enabled: false
  mountPath: /home/node/.openclaw/openclaw.json
  content: |
    {
      agents: { defaults: { models: { "litellm/gpt-5.2": { alias: "gpt-5.2" } } } },
      gateway: {
        auth: { mode: "token", token: "${OPENCLAW_GATEWAY_TOKEN}" },
      },
      models: {
        providers: {
          litellm: {
            baseUrl: "http://litellm.litellm.svc.cluster.local:4000/v1",
            models: [
              {
                id: "openai/gpt-5.2",
                name: "gpt-5.2",
              },
            ],
          },
        },
      },
    }

persistence:
  enabled: true
  storageClass: nfs-client
  config:
    size: 2Gi
  workspace:
    size: 10Gi

